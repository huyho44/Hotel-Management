<div id="humans-page">
  <style>
    #humans-page {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #humans-page h1,
    #humans-page h2 {
      margin-bottom: 10px;
    }

    #humans-page table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    #humans-page th,
    #humans-page td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    #humans-page th {
      background-color: #f0f0f0;
    }

    #humans-page form {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }

    #humans-page label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    #humans-page input {
      padding: 4px 6px;
    }

    #humans-page button {
      padding: 6px 10px;
      cursor: pointer;
    }

    #humans-page .error {
      color: red;
      margin-top: 10px;
    }

    #humans-page .success {
      color: green;
      margin-top: 10px;
    }
  </style>

  <h1>Human Management</h1>

  <h2>Insert/Update Human</h2>

  <form id="human-form">
    <input type="hidden" id="mode" value="create" />
    <input type="hidden" id="editId" />

    <label>
      Citizen_ID (INT)
      <input type="number" id="citizenId" required />
    </label>

    <label>
      Last_Name
      <input type="text" id="lastName" required />
    </label>

    <label>
      First_Name
      <input type="text" id="firstName" required />
    </label>

    <label>
      Birth_Date
      <input type="date" id="dob" required />
    </label>

    <label>
      Email
      <input type="email" id="email" required />
    </label>

    <label>
      Gender (M/F)
      <input type="text" id="gender" maxlength="1" required />
    </label>

    <button type="submit">Save</button>
    <button type="button" id="reset-btn">Reset</button>
  </form>

  <div id="message"></div>

  <h2>List of Humans</h2>
  <table>
    <thead>
      <tr>
        <th>Citizen_ID</th>
        <th>Last_Name</th>
        <th>First_Name</th>
        <th>Birth_Date</th>
        <th>Email</th>
        <th>Gender</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="human-table-body"></tbody>
  </table>
  <script>
    (function () {

      const API_BASE = "";

      const form = document.getElementById("human-form");
      const modeInput = document.getElementById("mode");
      const editIdInput = document.getElementById("editId");
      const citizenIdInput = document.getElementById("citizenId");
      const lastNameInput = document.getElementById("lastName");
      const firstNameInput = document.getElementById("firstName");
      const dobInput = document.getElementById("dob");
      const emailInput = document.getElementById("email");
      const genderInput = document.getElementById("gender");
      const messageDiv = document.getElementById("message");
      const tableBody = document.getElementById("human-table-body");
      const resetBtn = document.getElementById("reset-btn");

      async function loadHumans() {
        tableBody.innerHTML = "<tr><td colspan='7'>Loading...</td></tr>";
        try {
          const res = await fetch(`${API_BASE}/humans`);
          const data = await res.json();
          renderTable(data);
        } catch (err) {
          tableBody.innerHTML = "<tr><td colspan='7'>Error loading humans</td></tr>";
        }
      }

      function renderTable(humans) {
        if (!Array.isArray(humans) || humans.length === 0) {
          tableBody.innerHTML = "<tr><td colspan='7'>No data</td></tr>";
          return;
        }

        tableBody.innerHTML = "";
        humans.forEach(h => {
          const tr = document.createElement("tr");

          const birthStr = h.Birth_Date
            ? typeof h.Birth_Date === "string"
              ? h.Birth_Date.substring(0, 10)
              : new Date(h.Birth_Date).toISOString().substring(0, 10)
            : "";

          tr.innerHTML = `
        <td>${h.Citizen_ID}</td>
        <td>${h.Last_Name}</td>
        <td>${h.First_Name}</td>
        <td>${birthStr}</td>
        <td>${h.Email ?? ""}</td>
        <td>${h.Gender ?? ""}</td>
        <td>
          <button data-action="edit" data-id="${h.Citizen_ID}">Edit</button>
          <button data-action="delete" data-id="${h.Citizen_ID}">Delete</button>
        </td>
      `;
          tableBody.appendChild(tr);
        });
      }

      function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = type === "error" ? "error" : "success";
      }

      function resetForm() {
        modeInput.value = "create";
        editIdInput.value = "";
        form.reset();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const mode = modeInput.value;
        const id = parseInt(citizenIdInput.value, 10);

        const bodyCreate = {
          Citizen_ID: id,
          LastName: lastNameInput.value,
          FirstName: firstNameInput.value,
          DateOfBirth: dobInput.value,
          Email: emailInput.value,
          Gender: genderInput.value
        };

        const bodyUpdate = {
          FirstName: firstNameInput.value,
          LastName: lastNameInput.value,
          DateOfBirth: dobInput.value,
          Gender: genderInput.value,
          Email: emailInput.value
        };

        try {
          let res;
          if (mode === "create") {
            res = await fetch(`${API_BASE}/humans`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(bodyCreate)
            });
          } else {
            const editId = editIdInput.value;
            res = await fetch(`${API_BASE}/humans/${editId}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(bodyUpdate)
            });
          }

          const data = await res.json();

          if (!res.ok) showMessage(`Error: ${data.error}`, "error");
          else {
            showMessage(data.message || "Success", "success");
            await loadHumans();
            resetForm();
          }
        } catch (err) {
          showMessage("Request failed", "error");
        }
      });

      tableBody.addEventListener("click", async (e) => {
        const btn = e.target;
        const action = btn.dataset.action;
        const id = btn.dataset.id;

        if (action === "edit") {
          const res = await fetch(`/humans/${id}`);
          if (!res.ok) {
            showMessage("Failed to load human", "error");
            return;
          }
          const human = await res.json();

          modeInput.value = "edit";
          editIdInput.value = human.Citizen_ID;
          citizenIdInput.value = human.Citizen_ID;
          lastNameInput.value = human.Last_Name;
          firstNameInput.value = human.First_Name;
          dobInput.value = human.Birth_Date.substring(0, 10);
          emailInput.value = human.Email;
          genderInput.value = human.Gender;
        }

        if (action === "delete") {
          if (!confirm(`Delete Human ${id}?`)) return;

          try {
            const res = await fetch(`/humans/${id}`, { method: "DELETE" });
            const data = await res.json();

            if (!res.ok) {
              showMessage(data.error || data.message || "Delete failed", "error");
            } else {
              showMessage(data.message || "Deleted", "success");
              await loadHumans();
            }
          } catch (err) {
            showMessage("Request failed", "error");
          }
        }
      });

      resetBtn.addEventListener("click", () => {
        resetForm();
        messageDiv.textContent = "";
      });

      loadHumans();

    })();
  </script>

</div>
